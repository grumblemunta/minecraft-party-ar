<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minecraft Party AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <!-- AR.js 3.x — supports GPS + marker in the same scene -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDhT4qioVyzVQ-tzAfTQpA-1y58D80mbmM",
      authDomain: "minecraft-party-2026.firebaseapp.com",
      databaseURL: "https://minecraft-party-2026-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "minecraft-party-2026",
      storageBucket: "minecraft-party-2026.firebasestorage.app",
      messagingSenderId: "794136755217",
      appId: "1:794136755217:web:61e065f7493456ca63c5b0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>

  <style>
    body { margin: 0; overflow: hidden; }

    #debug {
      position: fixed;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      color: #5dbb63;
      font-family: monospace;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      z-index: 999;
      pointer-events: none;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div id="debug">
    GPS: <span id="dbgGps">waiting...</span><br>
    Accuracy: <span id="dbgAcc">--</span><br>
    Heading: <span id="dbgHeading">--</span><br>
    Tree dist: <span id="dbgDist">--</span>
  </div>

  <!--
    GPS-only scene for now — no <a-marker> as it conflicts with gps-camera init.
    We will add the cake marker back once GPS is confirmed working.
  -->
  <a-scene
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false;">

    <!-- DIAGNOSTIC: plain red box, no GPS, always 5m ahead.
         If this is visible, A-Frame rendering works fine.
         If this is NOT visible, the scene itself isn't rendering. -->
    <a-box color="red" width="2" height="2" depth="2" position="0 1 -5"></a-box>

    <!-- Oak Tree — gps-entity-place on the entity wrapper -->
    <a-entity gps-entity-place="latitude: 51.4106854; longitude: -0.0766787">
      <a-box color="#5C3A1E" width="0.6" height="3" depth="0.6" position="0 1.5 0"></a-box>
      <a-box color="#2D6A4F" width="3"   height="0.6" depth="3"   position="0 3.5 0"></a-box>
      <a-box color="#2D6A4F" width="2.4" height="0.6" depth="2.4" position="0 4.1 0"></a-box>
      <a-box color="#2D6A4F" width="1.2" height="0.6" depth="1.2" position="0 4.7 0"></a-box>
    </a-entity>

    <!-- look-controls disabled so gps-camera owns orientation -->
    <a-camera gps-camera rotation-reader look-controls="enabled: false"></a-camera>

  </a-scene>

  <script>
    const TREE_LAT = 51.4106854;
    const TREE_LON = -0.0766787;

    function haversineM(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 +
                Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    if ('geolocation' in navigator) {
      navigator.geolocation.watchPosition((pos) => {
        const { latitude, longitude, accuracy } = pos.coords;
        document.getElementById('dbgGps').textContent =
          latitude.toFixed(5) + ', ' + longitude.toFixed(5);
        document.getElementById('dbgAcc').textContent = '+/- ' + Math.round(accuracy) + 'm';
        const dist = haversineM(latitude, longitude, TREE_LAT, TREE_LON);
        document.getElementById('dbgDist').textContent = Math.round(dist) + 'm away';
      }, null, { enableHighAccuracy: true });
    }

    // Heading — works on Android (absolute) and iOS (webkit)
    window.addEventListener('deviceorientationabsolute', (e) => {
      if (e.alpha !== null)
        document.getElementById('dbgHeading').textContent = Math.round(e.alpha) + 'deg (abs)';
    }, true);
    window.addEventListener('deviceorientation', (e) => {
      if (e.webkitCompassHeading !== undefined)
        document.getElementById('dbgHeading').textContent =
          Math.round(e.webkitCompassHeading) + 'deg (webkit)';
    }, true);
  </script>

</body>
</html>
