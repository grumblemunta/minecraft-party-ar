<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minecraft Party AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <!-- AR.js 3.x — supports GPS + marker in the same scene -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDhT4qioVyzVQ-tzAfTQpA-1y58D80mbmM",
      authDomain: "minecraft-party-2026.firebaseapp.com",
      databaseURL: "https://minecraft-party-2026-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "minecraft-party-2026",
      storageBucket: "minecraft-party-2026.firebasestorage.app",
      messagingSenderId: "794136755217",
      appId: "1:794136755217:web:61e065f7493456ca63c5b0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>

  <style>
    body { margin: 0; overflow: hidden; }

    /* Debug overlay — tap to hide */
    #debug {
      position: fixed;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      color: #5dbb63;
      font-family: monospace;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      z-index: 999;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="debug">
    GPS: <span id="dbgGps">waiting...</span><br>
    Heading: <span id="dbgHeading">--</span>
  </div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">

    <!-- ============================================================
         OUTDOOR GPS WORLD
         All sizes are in metres. 1 unit = 1 metre in GPS mode.
         ============================================================ -->

    <!-- Oak Tree -->
    <a-entity gps-entity-place="latitude: 51.4106854; longitude: -0.0766787">

      <!-- Trunk: 0.6m wide, 3m tall, base at ground (y=0) -->
      <a-box
        color="#5C3A1E"
        width="0.6" height="3" depth="0.6"
        position="0 1.5 0">
      </a-box>

      <!-- Leaves — three layers, Minecraft stepped canopy -->
      <!-- Bottom layer: widest -->
      <a-box
        color="#2D6A4F"
        width="3" height="0.6" depth="3"
        position="0 3.5 0">
      </a-box>
      <!-- Middle layer -->
      <a-box
        color="#2D6A4F"
        width="2.4" height="0.6" depth="2.4"
        position="0 4.1 0">
      </a-box>
      <!-- Top layer: narrowest -->
      <a-box
        color="#2D6A4F"
        width="1.2" height="0.6" depth="1.2"
        position="0 4.7 0">
      </a-box>

    </a-entity>


    <!-- ============================================================
         INDOOR MARKER WORLD
         Point camera at a Hiro marker (print from:
         https://raw.githack.com/AR-js-org/AR.js/master/data/images/hiro.png)
         We will build the Ghast cake scene here next.
         ============================================================ -->

    <a-marker preset="hiro">
      <!-- Placeholder — Ghast cake coming soon -->
      <a-text
        value="Ghast\ncake\ncoming\nsoon!"
        align="center"
        color="#5dbb63"
        position="0 0.5 0"
        scale="0.5 0.5 0.5">
      </a-text>
    </a-marker>


    <!-- Camera: gps-camera enables location-based AR -->
    <a-camera gps-camera rotation-reader></a-camera>

  </a-scene>

  <script>
    // Update debug overlay with live GPS + heading
    if ('geolocation' in navigator) {
      navigator.geolocation.watchPosition((pos) => {
        document.getElementById('dbgGps').textContent =
          pos.coords.latitude.toFixed(5) + ', ' +
          pos.coords.longitude.toFixed(5) +
          ' (+/-' + Math.round(pos.coords.accuracy) + 'm)';
      }, null, { enableHighAccuracy: true });
    }

    window.addEventListener('deviceorientationabsolute', (e) => {
      if (e.alpha !== null) {
        document.getElementById('dbgHeading').textContent =
          Math.round(e.alpha) + 'deg';
      }
    }, true);
  </script>

</body>
</html>
