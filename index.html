<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Minecraft Party AR - Shared World</title>
  
  <!-- A-Frame (stable version that works well with AR.js) -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  
  <!-- AR.js (latest stable build) -->
  <script src="https://cdn.jsdelivr.net/gh/jeromeetienne/AR.js@2.2.2/aframe/build/aframe-ar.js"></script>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <script>
    // ================== YOUR FIREBASE CONFIG ==================
    const firebaseConfig = {
      apiKey: "AIzaSyDhT4qioVyzVQ-tzAfTQpA-1y58D80mbmM",
      authDomain: "minecraft-party-2026.firebaseapp.com",
      databaseURL: "https://minecraft-party-2026-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "minecraft-party-2026",
      storageBucket: "minecraft-party-2026.firebasestorage.app",
      messagingSenderId: "794136755217",
      appId: "1:794136755217:web:61e065f7493456ca63c5b0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>

  <script>
    // Shared position component
    AFRAME.registerComponent('shared-position', {
      schema: { path: {type: 'string', default: 'party/mobs'} },
      init: function () {
        this.dbRef = db.ref(this.data.path);
        this.dbRef.on('value', (snap) => {
          const data = snap.val();
          if (data && data.pos) {
            this.el.setAttribute('position', data.pos);
          }
        });
      },
      tick: function (time) {
        if (time % 200 < 16) {
          const pos = this.el.getAttribute('position');
          this.dbRef.update({ pos: `${pos.x} ${pos.y} ${pos.z}` });
        }
      }
    });
  </script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.5;">

    <!-- Your custom marker -->
    <a-marker preset="custom" type="pattern" url="party-marker.patt">

      <!-- Shared Creeper -->
      <a-entity 
        gltf-model="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/Duck/glTF/Duck.gltf"
        scale="0.15 0.15 0.15" 
        position="0 0.3 0"
        shared-position="path: party/mobs/creeper1"
        animation="property: position; to: 0 0.45 0; loop: true; dur: 2000; easing: easeInOutSine">
      </a-entity>

      <!-- Invisible cake occlusion -->
      <a-entity 
        geometry="primitive: box; width: 0.35; height: 0.25; depth: 0.35" 
        material="visible: false; depthWrite: true" 
        position="0 0.12 0">
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
